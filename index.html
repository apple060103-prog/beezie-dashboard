<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beezie Referral Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-row-even: #16161f;
    --bg-row-hover: #1e1e2a;
    --accent-gold: #f0b90b;
    --accent-green: #0ecb81;
    --accent-blue: #3b82f6;
    --accent-purple: #a78bfa;
    --text-primary: #e8e8ed;
    --text-secondary: #8b8b9e;
    --text-muted: #4a4a5e;
    --border: #1e1e2d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(240,185,11,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 36px; }

  .header-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(240,185,11,0.08);
    border: 1px solid rgba(240,185,11,0.2);
    border-radius: 20px; padding: 5px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent-gold);
    letter-spacing: 0.5px; margin-bottom: 16px;
    text-transform: uppercase;
  }

  .header-badge .dot {
    width: 6px; height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .header-badge .dot.offline { background: var(--text-muted); animation: none; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #f0b90b 0%, #fcd535 50%, #f0b90b 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }

  .header p { color: var(--text-secondary); font-size: 13px; font-weight: 300; }

  /* Stats */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 16px; text-align: center;
    transition: border-color 0.3s;
  }
  .stat-card:hover { border-color: rgba(240,185,11,0.3); }

  .stat-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700;
  }
  .stat-value.gold { color: var(--accent-gold); }
  .stat-value.green { color: var(--accent-green); }
  .stat-value.blue { color: var(--accent-blue); }

  /* Timer */
  .timer-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  .timer-left { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
  .timer-right { display: flex; align-items: center; gap: 10px; }

  .timer-countdown {
    color: var(--accent-gold); font-weight: 600;
    min-width: 36px; text-align: right;
  }

  .timer-progress {
    width: 100px; height: 3px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }

  .timer-progress-fill {
    height: 100%; background: var(--accent-gold);
    border-radius: 2px; transition: width 1s linear;
  }

  /* Table */
  .table-wrapper {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1.2px; text-align: left;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.01);
  }
  thead th:nth-child(3), thead th:nth-child(4) { text-align: right; }

  tbody tr {
    transition: background 0.2s;
    border-bottom: 1px solid rgba(255,255,255,0.02);
  }
  tbody tr:nth-child(even) { background: var(--bg-row-even); }
  tbody tr:hover { background: var(--bg-row-hover); }

  tbody td { padding: 12px 16px; font-size: 13px; }

  .rank-cell {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; width: 50px; text-align: center;
  }
  .rank-1 { color: #ffd700; font-size: 16px; }
  .rank-2 { color: #c0c0c0; font-size: 15px; }
  .rank-3 { color: #cd7f32; font-size: 14px; }
  .rank-other { color: var(--text-muted); font-size: 13px; }

  .user-cell {
    font-weight: 500; font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .top-user { color: var(--accent-gold); font-weight: 700; }

  .volume-cell {
    text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }
  .volume-zero { color: var(--text-muted); }

  .usdc-cell {
    text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }
  .usdc-positive { color: var(--accent-green); }
  .usdc-zero { color: var(--text-muted); }

  /* Loading */
  .loading-overlay {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 20px; text-align: center;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text-secondary);
  }

  .error-text { color: #ef4444; font-size: 13px; margin-top: 8px; }

  /* Footer */
  .footer {
    text-align: center; margin-top: 28px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .footer a { color: var(--accent-gold); text-decoration: none; }

  /* Animations */
  .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; } }

  .updated-flash { animation: flash 0.8s ease-out; }
  @keyframes flash { 0% { background: rgba(14,203,129,0.08); } 100% {} }

  @media (max-width: 600px) {
    .container { padding: 24px 12px 40px; }
    .header h1 { font-size: 22px; }
    .stats-row { grid-template-columns: 1fr; gap: 8px; }
    .stat-value { font-size: 18px; }
    thead th { padding: 10px; font-size: 9px; }
    tbody td { padding: 10px; font-size: 12px; }
    .user-cell { font-size: 11px; }
    .timer-progress { width: 60px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">
  <div class="header fade-in">
    <div class="header-badge">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">CONNECTING...</span>
    </div>
    <h1>🐝 Beezie Referral</h1>
    <p>레퍼럴 볼륨 & USDC 페이백 트래커</p>
  </div>

  <div class="stats-row fade-in" style="animation-delay:0.1s">
    <div class="stat-card">
      <div class="stat-label">Total Volume</div>
      <div class="stat-value gold" id="totalVolume">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Est. Payback (1%)</div>
      <div class="stat-value green" id="totalPayback">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Referrals</div>
      <div class="stat-value blue" id="totalReferrals">—</div>
    </div>
  </div>

  <div class="timer-bar fade-in" style="animation-delay:0.15s">
    <div class="timer-left">
      <span>⟳</span>
      <span>다음 새로고침</span>
    </div>
    <div class="timer-right">
      <span class="timer-countdown" id="countdown">--</span>
      <div class="timer-progress">
        <div class="timer-progress-fill" id="progressFill" style="width:100%"></div>
      </div>
    </div>
  </div>

  <div class="table-wrapper fade-in" style="animation-delay:0.2s">
    <table>
      <thead>
        <tr>
          <th style="text-align:center">#</th>
          <th>User</th>
          <th style="text-align:right">Volume</th>
          <th style="text-align:right">USDC (1%)</th>
        </tr>
      </thead>
      <tbody id="leaderboard">
        <tr><td colspan="4">
          <div class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">데이터 로딩 중...</div>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer fade-in" style="animation-delay:0.3s">
    <span id="lastUpdate">데이터 대기 중...</span><br>
    Payback = Volume × 0.01 · Powered by <a href="https://beezie.com" target="_blank">Beezie</a>
  </div>
</div>

<script>
// ============================================================
//  읽기 전용 — API 키 없음 (퍼블릭 빈)
//  구독자 브라우저에 민감 정보 노출 제로
// ============================================================
const JSONBIN_BIN_ID = '69ba6995c3097a1dd5369796';
// ============================================================

const PAYBACK_RATE = 0.01;

function formatUSD(n) {
  return '$' + n.toLocaleString('en-US');
}

function formatUSDC(n) {
  if (n === 0) return '$0.00';
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function getRankDisplay(rank) {
  if (rank === 1) return { text: '🥇', cls: 'rank-1' };
  if (rank === 2) return { text: '🥈', cls: 'rank-2' };
  if (rank === 3) return { text: '🥉', cls: 'rank-3' };
  return { text: String(rank), cls: 'rank-other' };
}

function timeAgo(isoString) {
  const diff = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '방금 전';
  if (mins < 60) return `${mins}분 전`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}시간 전`;
  return `${Math.floor(hrs / 24)}일 전`;
}

function setStatus(online) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (online) {
    dot.className = 'dot';
    text.textContent = 'LIVE';
  } else {
    dot.className = 'dot offline';
    text.textContent = 'OFFLINE';
  }
}

function renderData(payload) {
  const { leaderboard, total_volume, total_payback, total_users, active_users, updated_at } = payload;

  document.getElementById('totalVolume').textContent = formatUSD(total_volume);
  document.getElementById('totalPayback').textContent = formatUSDC(total_payback);
  document.getElementById('totalReferrals').textContent = `${total_users} (${active_users} active)`;

  const tbody = document.getElementById('leaderboard');
  tbody.innerHTML = leaderboard.map((d, i) => {
    const rank = i + 1;
    const r = getRankDisplay(rank);
    const usdc = d.volume * PAYBACK_RATE;
    const isTop = rank <= 3 && d.volume > 0;
    const volClass = d.volume === 0 ? 'volume-zero' : '';
    const usdcClass = usdc > 0 ? 'usdc-positive' : 'usdc-zero';
    const userClass = isTop ? 'user-cell top-user' : 'user-cell';

    return `<tr>
      <td class="rank-cell ${r.cls}">${r.text}</td>
      <td class="${userClass}">${d.user}</td>
      <td class="volume-cell ${volClass}">${formatUSD(d.volume)}</td>
      <td class="usdc-cell ${usdcClass}">${formatUSDC(usdc)}</td>
    </tr>`;
  }).join('');

  const ago = timeAgo(updated_at);
  const localTime = new Date(updated_at).toLocaleString('ko-KR', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${localTime} (${ago})`;

  setStatus(true);

  // 업데이트 플래시
  const tw = document.querySelector('.table-wrapper');
  tw.classList.add('updated-flash');
  setTimeout(() => tw.classList.remove('updated-flash'), 1000);
}

async function fetchData() {
  try {
    // 퍼블릭 빈 읽기 전용 — API 키 불필요, 쓰기 불가
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const payload = json.record;

    if (payload && payload.leaderboard) {
      renderData(payload);
    } else {
      throw new Error('Invalid data format');
    }
  } catch (err) {
    console.error('Fetch error:', err);
    setStatus(false);
    const tbody = document.getElementById('leaderboard');
    if (tbody.querySelector('.loading-overlay')) {
      tbody.innerHTML = `<tr><td colspan="4">
        <div class="loading-overlay">
          <div class="loading-text">데이터를 불러올 수 없습니다</div>
          <div class="error-text">스크래퍼가 실행 중인지 확인하세요</div>
        </div>
      </td></tr>`;
    }
  }
}

// Timer
function getSecondsUntilNextRefresh() {
  const now = new Date();
  const min = now.getMinutes();
  const sec = now.getSeconds();
  const ms = now.getMilliseconds();
  const currentIntoSlot = ((min % 5) * 60) + sec + (ms / 1000);
  const slotTotal = 300;
  const remaining = slotTotal - currentIntoSlot;
  return remaining <= 0 ? slotTotal : remaining;
}

function updateTimer() {
  const remaining = getSecondsUntilNextRefresh();
  const mins = Math.floor(remaining / 60);
  const secs = Math.floor(remaining % 60);
  document.getElementById('countdown').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
  document.getElementById('progressFill').style.width = (remaining / 300 * 100) + '%';
}

function scheduleNextFetch() {
  const remaining = getSecondsUntilNextRefresh();
  setTimeout(() => {
    fetchData();
    scheduleNextFetch();
  }, remaining * 1000);
}

// Init
fetchData();
updateTimer();
setInterval(updateTimer, 1000);
scheduleNextFetch();
</script>
</body>
</html>
